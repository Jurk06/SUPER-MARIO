<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4d5e"/>
      <stop offset="100%" stop-color="#1e1f29"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
       <stop offset="0%" stop-color="#91282c"/>
       <stop offset="100%" stop-color="#451113"/>
    </linearGradient>
  </defs>
  <!-- Castle Base -->
  <rect x="25" y="80" width="150" height="120" fill="url(#bg)"/>
  <rect x="15" y="80" width="170" height="15" fill="#2d2f3b"/>
  <!-- Towers -->
  <rect x="25" y="30" width="40" height="60" fill="url(#bg)"/>
  <rect x="135" y="30" width="40" height="60" fill="url(#bg)"/>
  
  <rect x="15" y="45" width="60" height="10" fill="#2d2f3b"/>
  <rect x="125" y="45" width="60" height="10" fill="#2d2f3b"/>
  <!-- Roofs -->
  <polygon points="45,5 15,35 75,35" fill="url(#roof)"/>
  <polygon points="155,5 125,35 185,35" fill="url(#roof)"/>
  <!-- Main Entrance -->
  <path d="M 75 200 L 75 130 A 25 25 0 0 1 125 130 L 125 200 Z" fill="#13141a"/>
  <!-- Windows -->
  <rect x="40" y="110" width="15" height="30" fill="#e8c338" rx="5"/>
  <rect x="145" y="110" width="15" height="30" fill="#e8c338" rx="5"/>
  <rect x="40" y="60" width="10" height="15" fill="#13141a" rx="3"/>
  <rect x="150" y="60" width="10" height="15" fill="#13141a" rx="3"/>
  <!-- Banners -->
  <polygon points="90,80 110,80 100,110" fill="#91282c"/>
</svg>
